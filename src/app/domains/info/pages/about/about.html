<div>
  <input
    type="number"
    [value]="duration()"
    (input)="changeDuration($event)"
    name=""
    id="">

  <input
    type="text"
    [value]="message()"
    (input)="changeMessage($event)"
    name=""
    id="">

</div>
<p>
  <app-counter [duration]="duration()" [message]="message()" ></app-counter>
</p>
