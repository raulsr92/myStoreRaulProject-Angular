

<nav class="bg-gray-200 mx-auto">
  <div class="container flex flex-wrap items-center justify-between mx-auto py-4">
    <div class="flex items-center space-x-8">
      <a href="https://flowbite.com/" class="hidden! md:flex! items-center no-underline! ">
        <img
          src="https://flowbite.com/docs/images/logo.svg"
          class="h-6 mr-3"
          alt="Flowbite Logo"
        />
        <span class="self-center text-xl font-semibold whitespace-nowrap"
          >Flowbite</span
        >
      </a>
      <ul class="hidden! md:flex! space-x-6 mb-0 ">
        <li>
          <a
            routerLink="/"
            class="block underline hover:underline! text-black! font-medium"
            aria-current="page"
            >Home</a
          >
        </li>
        <li>
          <a
            routerLink="/about"
            class="block hover:underline! no-underline! text-black! font-medium"
            >About</a
          >
        </li>
        <li>
          <a
            routerLink="/services"
            class="block hover:underline! no-underline! text-black! font-medium"
            >Services</a
          >
        </li>
      </ul>

      <i class="block! md:hidden! fa-solid fa-bars text-[25px] "></i>
    </div>

    <div class="flex! md:hidden! ">
      <a href="https://flowbite.com/" class="flex items-center no-underline! ">
        <img
          src="https://flowbite.com/docs/images/logo.svg"
          class="h-6 mr-3"
          alt="Flowbite Logo"
        />
        <span class="self-center text-xl font-semibold whitespace-nowrap"
          >Flowbite</span
        >
      </a>
    </div>

    <div class="flex items-center relative">
      <button class="px-4" (click)="toogleSideMenu()">
        <i class="fa-solid fa-cart-shopping text-[25px] text-blue-900"></i>
      </button>
      <span class="absolute right-[10px] top-[-12px] w-[20px] h-[20px] flex justify-center items-center bg-blue-700 text-white text-[14px] font-bold p-1 rounded-[50%]">{{cart().length}}</span>
    </div>
  </div>
</nav>


<!--Menu lateral del carrito-->

<div [class.translate-x-full]="hideSideMenu()" class="w-full sm:w-[58%] xl:w-[45%] 2xl:w-[40%] flex flex-col gap-y-4 fixed shadow-lg top-0 right-0 bg-red z-40  font-medium h-screen pt-4 overflow-y-auto transition-transform bg-white" >

  <div class="flex justify-between items-center px-[30px]">
    <p class="text-[16px] md:text-[18px] lg:text-xl mb-0">Mi carrito de Compras (<span>{{cart().length}}</span>)</p>
    <button class="flex items-center justify-center" (click)="toogleSideMenu()">
      <i class="fa-solid fa-xmark text-[16px] md:text-[18px] lg:text-xl"></i>
    </button>
  </div>

  <div class="flex flex-col gap-y-8 px-[20px] xl:px-[30px]">
    @for (product of cart(); track product.id) {

      <div class="flex gap-x-[14px] lg:gap-x-[20px] xl:gap-x-[30px] border-gray-300 border-solid border px-3 py-4 justify-around items-start rounded-md">
        <img [src]="product.images[0]" class="w-[55px] lg:w-[100px] rounded-md" alt="">
        <div>
          <p class="text-[14px]  xl:text-[18x] 2xl:text-[22px]">{{product.title}}</p>
          <p class="text-[12px] lg:text-[15px] text-gray-500 font-normal">Cantidad <span class="text-gray-500">1</span></p>
        </div>
        <div class="flex flex-col">
          <p class="text-[14px]  xl:text-[18x] 2xl:text-[22px] text-red-800">S/ {{product.price}}</p>
        </div>
        <button>
          <i class="fa-regular fa-trash-can  text-[20px] pt-2"></i>
        </button>

      </div>
    }

  </div>

  <div class="flex flex-col gap-y-[15px] px-[30px] pt-[25px] pb-[40px] shadow-[0px_-4px_7px_1px_rgba(79,78,78,0.20)] sticky bottom-0 bg-white">
      <div class="flex justify-between items-center">
        <p class="font-bold text-[24px] mb-0">Total estimado <span class="font-normal text-[16px]">Incluyendo IGV</span></p>
        <p class="mb-0 text font-bold text-[24px]">  {{ total() | currency:'S/ '}} </p>
      </div>
      <button class="bg-blue-950 text-white py-[10px] flex justify-center items-center gap-x-2"> <i class="fa-solid fa-lock"></i> PAGO SEGURO</button>
  </div>

</div>
