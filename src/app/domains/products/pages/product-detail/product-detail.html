
<div class="w-[80%] grid grid-cols-5 justify-center m-auto mt-[40px]!">
  <div class=" flex flex-col col-span-3 px-[40px] justify-center items-center">

    <div class="w-[80%] rounded border border-gray-200">
      <img
        alt="ecommerce"
        class="w-full object-cover object-center"
        [src]="productDetail()?.images?.[imgToShow()]"
      />
    </div>

    <div class="w-[80%] flex items-center justify-center mt-1">
      <div class="grid grid-cols-3 gap-1">

        @for (imageProduct of productDetail()?.images; track imageProduct; let index = $index) {
          <img
            alt="ecommerce"
            class="object-cover object-center rounded border-2 border-gray-200"
            [src]="imageProduct "
            (click)="imageHandler(index)"
          />
        }
      </div>
    </div>

  </div>

  <div class="flex flex-col gap-y-2 mt-2 w-full col-span-2 pr-[40px] ">
    <h2 class="text-[18px]! text-[#FA5400]! title-font tracking-widest font-bold!">{{ productDetail()?.category?.name | uppercase }}</h2>
    <h1 class="text-gray-900 text-3xl title-font font-medium mb-1">
      {{productDetail()?.title}}
    </h1>
    <p class="leading-relaxed text-justify text-gray-500">
      {{productDetail()?.description}}
    </p>
    <p class="title-font font-medium text-2xl text-gray-900 mt-5">{{ productDetail()?.price| currency:'S/ ' }}</p>
    <button
      class="flex items-center! rounded-full! justify-center text-[20px]! font-semibold text-white bg-black border-0 py-2 px-9 py-3 focus:outline-none hover:bg-gray-500! "
    >
      Add To Cart
    </button>
    <button class="flex gap-x-4! items-center! mt-5! rounded-full! text-[20px]! font-semibold justify-center bg-white border-black border-1 py-2 px-9 py-3">
      Favourites
      <i class="fa-regular fa-heart"></i>
    </button>
  </div>

</div>
