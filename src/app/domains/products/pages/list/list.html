 <section class="flex flex-col items-center gap-y-7.5 mt-[60px] mb-[60px]">

    <p class="text-amber-700 text-4xl" >Mis productos </p>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3  xl:grid-cols-4 gap-y-2.5 gap-x-3.5 w-[75%]">

      @for( product of products();track product.id ){

        <app-product [products]="product" (addToCart)="unpackingMessageFromChild($event)"></app-product>

      }

    </div>
 </section>
