
<div class="flex  list-none gap-x-[30px] bg-blue-900  font-semibold pl-[60px] py-[25px] items-center">
        <li>
          <a routerLink="/" class="text-[16px] no-underline! text-white">All</a>
        </li>
  @for (categoria of categories(); track categoria.id) {
          <li >
            <a
             routerLink="/"
             [queryParams]="{categoryId: categoria.id}"
             class="text-[16px] no-underline! text-white">{{categoria.name}}</a>
          </li>
  }
</div>

<div class="container mx-auto">

  <section class="flex flex-col items-center gap-y-7.5 mt-[20px] mb-[60px]">

      <p class="text-blue-700 text-3xl font-bold" >Productos Principales </p>



      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3  xl:grid-cols-4 gap-y-2.5 gap-x-3.5 ">

        @for( product of products();track product.id ){

          <app-product [product]="product" (addToCart2)="addToCart($event)"></app-product>

        }

      </div>
  </section>
</div>
